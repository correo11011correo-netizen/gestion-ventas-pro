<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Sistema de Ventas Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { margin:0; background:#020617; font-family:'Inter',sans-serif; }
        .landing { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
        .btn-huge { padding: 20px 40px; font-size: 1.2rem; border-radius: 15px; width: 80%; max-width: 400px; text-align: center; text-decoration: none; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }
        .btn-dueno { background: #6366f1; }
        .btn-empleado { background: #10b981; }
    </style>
</head>
<body>
    <div class="app-wrapper landing">
        <div class="logo" style="margin-bottom: 30px; color:white; display:flex; align-items:center; gap:10px;">
            <i class="ri-store-2-fill" style="font-size:3rem; color:#6366f1;"></i>
            <h1 style="font-size:2.5rem; margin:0;">VENTAS<span style="color:#6366f1;">PRO</span></h1>
        </div>
        <a href="#" onclick="window.location.href='dueno.html?v='+Date.now()" class="btn-huge btn-dueno"><i class="ri-admin-line"></i> Panel Dueño / Admin</a>
        <a href="#" onclick="window.location.href='empleado.html?v='+Date.now()" class="btn-huge btn-empleado"><i class="ri-user-smile-line"></i> Panel Empleados</a>
    </div>
    
    <!-- ANTI CACHE MODERNO -->
    <script>
        (function(){
            var v = Date.now();
            var link = document.createElement('link'); link.rel = 'stylesheet'; link.href = 'styles.css?v=' + v;
            document.head.appendChild(link);
            var script = document.createElement('script'); script.src = 'script.js?v=' + v;
            document.body.appendChild(script);
        })();
    </script>
</body>
</html>
