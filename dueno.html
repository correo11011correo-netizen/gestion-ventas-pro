<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Panel Dueño</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body data-role="dueno">
    <div class="app-wrapper">
        <header class="main-header">
            <div class="logo">
                <i class="ri-admin-fill" style="color:#6366f1;"></i>
                <h1>PANEL<span>DUEÑO</span></h1>
            </div>
            <div class="live-status">
                <span class="dot pulse"></span> EN VIVO
            </div>
        </header>

        <!-- NAVEGADOR DE PESTAÑAS -->
        <div class="dueno-nav">
            <button class="tab-btn active" onclick="switchTab('empleados')"><i class="ri-team-line"></i> Admin Empleados</button>
            <button class="tab-btn" onclick="switchTab('productos')"><i class="ri-box-3-line"></i> Admin Productos</button>
            <button class="tab-btn" onclick="switchTab('ventas')"><i class="ri-bar-chart-box-line"></i> Admin Ventas</button>
        </div>

        <div class="content-area">
            
            <!-- ==============================
                 TAB: ADMIN EMPLEADOS
            =============================== -->
            <div id="tab-empleados" class="tab-content active grid-layout">
                <div class="column-left">
                    <div class="card">
                        <h2><i class="ri-user-add-line"></i> Alta Empleado</h2>
                        <form id="formAddEmpleado">
                            <div class="input-group">
                                <input type="text" id="d_nombreEmp" required placeholder="Nombre del empleado">
                            </div>
                            <button class="btn-primary" type="submit">Guardar Empleado</button>
                        </form>
                    </div>

                    <div class="card">
                        <h2><i class="ri-user-settings-line"></i> Gestión de Personal</h2>
                        <div id="listaEmpleados" class="mini-list"></div>
                    </div>
                </div>

                <div class="column-right">
                    <div class="card bg-accent">
                        <h2><i class="ri-time-line"></i> Turno Actual (En Vivo)</h2>
                        <div id="turnoLive" class="turno-data">Esperando conexión...</div>
                    </div>
                </div>
            </div>

            <!-- ==============================
                 TAB: ADMIN PRODUCTOS
            =============================== -->
            <div id="tab-productos" class="tab-content grid-layout">
                <div class="column-left">
                    <div class="card">
                        <h2><i class="ri-add-box-line"></i> Nuevo Producto</h2>
                        <form id="formAddProducto">
                            <div class="input-group">
                                <label>Nombre del Producto / Servicio</label>
                                <input type="text" id="p_nombre" required>
                            </div>
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                                <div class="input-group">
                                    <label>Precio ($)</label>
                                    <input type="number" id="p_precio" required inputmode="numeric" step="0.01">
                                </div>
                                <div class="input-group">
                                    <label>Stock Disp.</label>
                                    <input type="number" id="p_stock" required inputmode="numeric">
                                </div>
                            </div>
                            <button class="btn-primary" type="submit" style="background:#10b981;">Guardar Producto</button>
                        </form>
                    </div>
                </div>

                <div class="column-right">
                    <div class="card">
                        <h2><i class="ri-archive-line"></i> Inventario Local</h2>
                        <div class="table-scroll">
                            <table class="mobile-table">
                                <thead><tr><th>Producto</th><th>Stock</th><th>Precio</th><th></th></tr></thead>
                                <tbody id="productosTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ==============================
                 TAB: ADMIN VENTAS
            =============================== -->
            <div id="tab-ventas" class="tab-content">
                <div class="card">
                    <h2><i class="ri-money-dollar-circle-line"></i> Historial General de Ventas</h2>
                    <div class="total-ventas" style="margin-bottom:15px; text-align:left;">Recaudación Total: $<span id="totalVentasGlobal">0</span></div>
                    <div class="table-scroll">
                        <table class="mobile-table">
                            <thead><tr><th>Fecha/Hora</th><th>Empleado</th><th>Producto</th><th>Cant.</th><th>Total</th></tr></thead>
                            <tbody id="ventasAllTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- MODAL GESTION EMPLEADO -->
    <div id="modalEmp" class="modal" style="display:none;">
        <div class="modal-content">
            <i class="ri-close-line close-btn" onclick="cerrarModal()"></i>
            <h2 id="modalEmpTitle" style="color:var(--accent);"><i class="ri-user-star-line"></i> Empleado</h2>
            
            <h3 class="section-title"><i class="ri-flag-2-line"></i> Objetivos del Empleado</h3>
            <form id="formAddObj" class="flex-form">
                <input type="text" id="d_objTexto" required placeholder="Ej: Vender 3 fundas...">
                <button type="submit" class="btn-icon-submit" style="background:var(--accent);"><i class="ri-add-line"></i></button>
            </form>
            <div id="modalObjList" class="mini-list" style="margin-bottom:25px;"></div>

            <h3 class="section-title"><i class="ri-message-3-line"></i> Avisos / Mensajes</h3>
            <form id="formAddMsg" class="flex-form">
                <input type="text" id="d_msgTexto" required placeholder="Ej: Limpiar caja...">
                <button type="submit" class="btn-icon-submit" style="background:var(--success);"><i class="ri-send-plane-fill"></i></button>
            </form>
            <div id="modalMsgList" class="mini-list"></div>
        </div>
    </div>

    <script>
        (function(){
            var v = Date.now();
            var link = document.createElement('link'); link.rel = 'stylesheet'; link.href = 'styles.css?v=' + v;
            document.head.appendChild(link);
            var script = document.createElement('script'); script.src = 'script.js?v=' + v;
            document.body.appendChild(script);
        })();
    </script>
</body>
</html>
