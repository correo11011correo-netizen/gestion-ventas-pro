<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Panel Dueño</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body data-role="dueno">
    <div class="app-wrapper">
        <header class="main-header">
            <div class="logo">
                <i class="ri-admin-fill" style="color:#6366f1;"></i>
                <h1>PANEL<span>DUEÑO</span></h1>
            </div>
            <div class="live-status">
                <span class="dot pulse"></span> EN VIVO
            </div>
        </header>

        <div class="content-area grid-layout">
            <div class="column-left">
                <div class="card">
                    <h2><i class="ri-user-add-line"></i> Alta Empleado</h2>
                    <form id="formAddEmpleado">
                        <div class="input-group">
                            <input type="text" id="d_nombreEmp" required placeholder="Nombre del empleado">
                        </div>
                        <button class="btn-primary" type="submit">Guardar Empleado</button>
                    </form>
                </div>

                <div class="card">
                    <h2><i class="ri-user-settings-line"></i> Gestión de Personal</h2>
                    <p style="font-size:0.8rem; color:var(--text-dim); margin-bottom:15px;">Selecciona un empleado para ver opciones.</p>
                    <div id="listaEmpleados" class="mini-list"></div>
                </div>
            </div>

            <div class="column-right">
                <div class="card bg-accent">
                    <h2><i class="ri-time-line"></i> Turno Actual (En Vivo)</h2>
                    <div id="turnoLive" class="turno-data">Esperando conexión...</div>
                </div>

                <div class="card">
                    <h2><i class="ri-money-dollar-circle-line"></i> Ventas del Turno</h2>
                    <div class="table-scroll">
                        <table class="mobile-table">
                            <thead><tr><th>Hora</th><th>Descripción</th><th>Monto</th></tr></thead>
                            <tbody id="ventasTable"></tbody>
                        </table>
                    </div>
                    <div class="total-ventas">Total: $<span id="totalVentas">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL GESTION EMPLEADO -->
    <div id="modalEmp" class="modal" style="display:none;">
        <div class="modal-content">
            <i class="ri-close-line close-btn" onclick="cerrarModal()"></i>
            <h2 id="modalEmpTitle" style="color:var(--accent);"><i class="ri-user-star-line"></i> Empleado</h2>
            
            <h3 class="section-title"><i class="ri-flag-2-line"></i> Objetivos del Empleado</h3>
            <form id="formAddObj" class="flex-form">
                <input type="text" id="d_objTexto" required placeholder="Ej: Vender 3 fundas...">
                <button type="submit" class="btn-icon-submit" style="background:var(--accent);"><i class="ri-add-line"></i></button>
            </form>
            <div id="modalObjList" class="mini-list" style="margin-bottom:25px;"></div>

            <h3 class="section-title"><i class="ri-message-3-line"></i> Avisos / Mensajes</h3>
            <form id="formAddMsg" class="flex-form">
                <input type="text" id="d_msgTexto" required placeholder="Ej: Limpiar caja...">
                <button type="submit" class="btn-icon-submit" style="background:var(--success);"><i class="ri-send-plane-fill"></i></button>
            </form>
            <div id="modalMsgList" class="mini-list"></div>
        </div>
    </div>

    <!-- ANTI CACHE MODERNO -->
    <script>
        (function(){
            var v = Date.now();
            var link = document.createElement('link'); link.rel = 'stylesheet'; link.href = 'styles.css?v=' + v;
            document.head.appendChild(link);
            var script = document.createElement('script'); script.src = 'script.js?v=' + v;
            document.body.appendChild(script);
        })();
    </script>
</body>
</html>
