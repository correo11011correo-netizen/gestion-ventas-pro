<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Panel Dueño</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script>document.write('<link rel="stylesheet" href="styles.css?v=' + new Date().getTime() + '">');</script>
</head>
<body data-role="dueno">
    <div class="app-wrapper">
        <header class="main-header">
            <div class="logo">
                <i class="ri-admin-fill" style="color:#6366f1;"></i>
                <h1>PANEL<span>DUEÑO</span></h1>
            </div>
            <div class="live-status">
                <span class="dot pulse"></span> EN VIVO
            </div>
        </header>

        <div class="content-area grid-layout">
            <!-- COLUMNA IZQUIERDA: CONFIGURACIÓN -->
            <div class="column-left">
                <div class="card">
                    <h2><i class="ri-user-add-line"></i> Alta Empleado</h2>
                    <form id="formAddEmpleado">
                        <div class="input-group">
                            <input type="text" id="d_nombreEmp" required placeholder="Nombre del empleado">
                        </div>
                        <button class="btn-primary" type="submit">Guardar Empleado</button>
                    </form>
                    <div id="listaEmpleados" class="mini-list" style="margin-top:15px;"></div>
                </div>

                <div class="card">
                    <h2><i class="ri-target-line"></i> Asignar Objetivo</h2>
                    <form id="formAddObj">
                        <div class="input-group">
                            <input type="text" id="d_objTexto" required placeholder="Ej: Vender 5 accesorios">
                        </div>
                        <button class="btn-primary" style="background:#f59e0b;" type="submit">Agregar Objetivo</button>
                    </form>
                </div>
            </div>

            <!-- COLUMNA DERECHA: MONITOREO EN VIVO -->
            <div class="column-right">
                <div class="card bg-accent">
                    <h2><i class="ri-time-line"></i> Turno Actual</h2>
                    <div id="turnoLive" class="turno-data">Esperando que un empleado inicie turno...</div>
                </div>

                <div class="card">
                    <h2><i class="ri-money-dollar-circle-line"></i> Ventas en Tiempo Real</h2>
                    <div class="table-scroll">
                        <table class="mobile-table">
                            <thead><tr><th>Hora</th><th>Descripción</th><th>Monto</th></tr></thead>
                            <tbody id="ventasTable"></tbody>
                        </table>
                    </div>
                    <div class="total-ventas">Total: $<span id="totalVentas">0</span></div>
                </div>

                <div class="card">
                    <h2><i class="ri-checkbox-circle-line"></i> Control de Objetivos</h2>
                    <div id="objetivosLive" class="obj-list"></div>
                </div>
            </div>
        </div>
    </div>
    <script>document.write('<script src="script.js?v=' + new Date().getTime() + '"><\/script>');</script>
</body>
</html>
