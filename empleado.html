<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Panel Empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body data-role="empleado">
    <div class="app-wrapper">
        <header class="main-header" style="background:#064e3b; border-bottom-color:#047857;">
            <div class="logo">
                <i class="ri-user-smile-fill" style="color:#34d399;"></i>
                <h1>PANEL<span>EMPLEADO</span></h1>
            </div>
        </header>

        <div class="content-area">
            
            <!-- PANTALLA INICIAR TURNO -->
            <div id="screen-iniciar" class="card">
                <h2><i class="ri-play-circle-line"></i> Iniciar Turno</h2>
                <form id="formTurno">
                    <div class="input-group">
                        <label>Selecciona tu nombre</label>
                        <select id="e_empId" required></select>
                    </div>
                    <div class="input-group">
                        <label>Efectivo inicial en caja ($)</label>
                        <input type="number" id="e_cajaIni" required inputmode="numeric">
                    </div>
                    <button class="btn-primary" style="background:#10b981;" type="submit">Marcar Ingreso</button>
                </form>
            </div>

            <!-- PANTALLA TURNO ACTIVO -->
            <div id="screen-activo" style="display:none;">
                <div class="status-msg success" style="margin-bottom:20px;">
                    <i class="ri-user-line"></i> Turno activo: <strong id="e_nombreActivo"></strong>
                </div>

                <!-- AVISOS DEL DUEÑO -->
                <div class="card" style="border-left: 4px solid var(--success);">
                    <h2><i class="ri-message-3-line"></i> Avisos del Dueño</h2>
                    <div id="e_mensajes" class="obj-list"></div>
                </div>

                <div class="pos-container">
                    <div class="card pos-productos">
                        <h2><i class="ri-store-2-line"></i> Productos</h2>
                        <div id="v_productos_grid" class="productos-grid">
                            <!-- Botones de productos generados por JS -->
                        </div>
                    </div>
                    
                    <div class="card pos-carrito">
                        <h2><i class="ri-shopping-cart-2-line"></i> Carrito</h2>
                        <div id="v_carrito_lista" class="carrito-lista">
                            <!-- Items del carrito -->
                            <div class="empty-cart">El carrito está vacío</div>
                        </div>
                        <div class="carrito-totales">
                            <div class="total-row"><span>Total:</span> <strong id="v_carrito_total">$0.00</strong></div>
                            <div class="payment-methods">
                                <label class="pay-btn active" id="btn_pay_efectivo">
                                    <input type="radio" name="payMethod" value="Efectivo" checked onclick="selectPayMethod('Efectivo')"> 
                                    <i class="ri-money-dollar-circle-line"></i> Efectivo
                                </label>
                                <label class="pay-btn" id="btn_pay_transf">
                                    <input type="radio" name="payMethod" value="Transferencia" onclick="selectPayMethod('Transferencia')"> 
                                    <i class="ri-smartphone-line"></i> Transfer.
                                </label>
                            </div>
                            <button class="btn-primary btn-checkout" onclick="procesarVentaCarrito()" id="btn_checkout" disabled>Cobrar</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2><i class="ri-flag-2-line"></i> Mis Objetivos de Hoy</h2>
                    <div id="e_objetivos" class="obj-list"></div>
                </div>

                <div class="card" style="border-color:var(--error); background:transparent;">
                    <button class="btn-primary" style="background:var(--error);" onclick="cerrarTurno()">
                        <i class="ri-stop-circle-line"></i> Finalizar Turno
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        (function(){
            var v = Date.now();
            var link = document.createElement('link'); link.rel = 'stylesheet'; link.href = 'styles.css?v=' + v;
            document.head.appendChild(link);
            var script = document.createElement('script'); script.src = 'script.js?v=' + v;
            document.body.appendChild(script);
        })();
    </script>
</body>
</html>
